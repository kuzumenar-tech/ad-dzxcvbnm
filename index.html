<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mavi vs Turuncu Stickman</title>
<style>
body{
    margin:0;
    background:#222;
    overflow:hidden;
}
canvas{
    display:block;
    margin:auto;
    background:#87CEEB;
}
</style>
</head>
<body>

<canvas id="game" width="1000" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.7;

class Fighter{
    constructor(x,color,controls){
        this.x=x;
        this.y=350;
        this.w=40;
        this.h=80;
        this.color=color;
        this.dx=0;
        this.dy=0;
        this.health=100;
        this.controls=controls;
        this.attacking=false;
    }

    draw(){
        ctx.strokeStyle=this.color;
        ctx.lineWidth=5;

        let cx=this.x+20;
        let cy=this.y+20;

        // kafa
        ctx.beginPath();
        ctx.arc(cx,cy,12,0,Math.PI*2);
        ctx.stroke();

        // gövde
        ctx.beginPath();
        ctx.moveTo(cx,cy+12);
        ctx.lineTo(cx,cy+45);
        ctx.stroke();

        // kollar
        ctx.beginPath();
        ctx.moveTo(cx-15,cy+25);
        ctx.lineTo(cx+15,cy+25);
        ctx.stroke();

        // bacaklar
        ctx.beginPath();
        ctx.moveTo(cx,cy+45);
        ctx.lineTo(cx-12,cy+70);
        ctx.moveTo(cx,cy+45);
        ctx.lineTo(cx+12,cy+70);
        ctx.stroke();

        if(this.attacking){
            ctx.strokeStyle="yellow";
            ctx.beginPath();
            ctx.moveTo(cx+15,cy+25);
            ctx.lineTo(cx+40,cy+15);
            ctx.stroke();
        }
    }

    update(){
        this.x+=this.dx;
        this.y+=this.dy;

        this.dy+=gravity;

        if(this.y>350){
            this.y=350;
            this.dy=0;
        }

        if(this.x<0) this.x=0;
        if(this.x>960) this.x=960;
    }
}

const blue = new Fighter(150,"deepskyblue");
const orange = new Fighter(800,"orange");

const keys={};

window.addEventListener("keydown",(e)=>{
    keys[e.key]=true;

    if(e.key==="w" && blue.y>=350)
        blue.dy=-12;

    if(e.key==="ArrowUp" && orange.y>=350)
        orange.dy=-12;

    if(e.key==="f")
        attack(blue,orange);

    if(e.key==="l")
        attack(orange,blue);
});

window.addEventListener("keyup",(e)=>{
    keys[e.key]=false;
});

function attack(attacker,target){

    attacker.attacking=true;

    setTimeout(()=>{
        attacker.attacking=false;
    },150);

    const distance=Math.abs(attacker.x-target.x);

    if(distance<80){
        target.health-=10;
    }
}

function drawHealth(){

    ctx.fillStyle="red";
    ctx.fillRect(20,20,200,20);

    ctx.fillStyle="lime";
    ctx.fillRect(20,20,blue.health*2,20);

    ctx.fillStyle="red";
    ctx.fillRect(780,20,200,20);

    ctx.fillStyle="lime";
    ctx.fillRect(780,20,orange.health*2,20);
}

function winner(text){
    ctx.fillStyle="black";
    ctx.font="60px Arial";
    ctx.fillText(text,250,200);
}

function gameLoop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // zemin
    ctx.fillStyle="green";
    ctx.fillRect(0,430,1000,70);

    blue.dx=0;
    orange.dx=0;

    if(keys["a"]) blue.dx=-5;
    if(keys["d"]) blue.dx=5;

    if(keys["ArrowLeft"]) orange.dx=-5;
    if(keys["ArrowRight"]) orange.dx=5;

    blue.update();
    orange.update();

    blue.draw();
    orange.draw();

    drawHealth();

    if(blue.health<=0){
        winner("🟠 Turuncu Kazandı!");
        return;
    }

    if(orange.health<=0){
        winner("🔵 Mavi Kazandı!");
        return;
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
